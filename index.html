<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐧 ペンギン警察 X-CLASH</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Helvetica Neue',Arial,sans-serif;color:white;user-select:none;padding:10px;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
/* ===== TITLE SCREEN ===== */
#titleScreen{display:flex;flex-direction:column;align-items:center;width:100%;max-width:500px}
#titleScreen h1{font-size:26px;margin-bottom:4px;text-shadow:0 0 20px #7ecfff;letter-spacing:2px;text-align:center}
#titleScreen .subtitle{font-size:13px;color:#94a3b8;margin-bottom:16px}
#levelGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;padding:4px}
.lvl-btn{aspect-ratio:1;border-radius:14px;border:none;font-size:18px;font-weight:bold;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform 0.12s;touch-action:manipulation;-webkit-appearance:none;position:relative}
.lvl-btn.unlocked{background:linear-gradient(135deg,#0ea5e9,#0284c7);color:white;box-shadow:0 4px 14px rgba(14,165,233,0.5)}
.lvl-btn.cleared{background:linear-gradient(135deg,#f59e0b,#d97706);color:white;box-shadow:0 4px 14px rgba(245,158,11,0.5)}
.lvl-btn.locked{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.3);cursor:default}
.lvl-btn.unlocked:active,.lvl-btn.cleared:active{transform:scale(0.93)}
.lvl-star{font-size:11px;margin-top:1px}
.title-music-btn{margin-top:14px;padding:10px 24px;font-size:14px;font-weight:bold;background:linear-gradient(135deg,#22c55e,#16a34a);color:white;border:none;border-radius:10px;cursor:pointer;touch-action:manipulation;-webkit-appearance:none}
/* ===== GAME SCREEN ===== */
#gameScreen{display:none;flex-direction:column;align-items:center;width:100%}
#topRow{display:flex;align-items:center;gap:16px;margin-bottom:3px}
#levelInfo{font-size:15px;color:#ffd700;font-weight:bold}
#stars{font-size:14px;color:#ffd700;letter-spacing:1px}
#message{font-size:16px;margin:5px 0;height:24px;font-weight:bold;color:#a5f3fc;text-shadow:0 0 10px #0ea5e9;text-align:center}
#gameCanvas{border-radius:16px;box-shadow:0 0 40px rgba(126,207,255,0.3);cursor:pointer;max-width:96vw;aspect-ratio:500/530;touch-action:none}
.btn-row{display:flex;gap:8px;margin-top:9px;flex-wrap:wrap;justify-content:center}
button{padding:12px 20px;font-size:15px;font-weight:bold;background:linear-gradient(135deg,#e94560,#c73652);color:white;border:none;border-radius:10px;cursor:pointer;transition:transform 0.1s;box-shadow:0 4px 12px rgba(233,69,96,0.4);touch-action:manipulation;-webkit-appearance:none}
button:hover{transform:translateY(-2px)}
button.blue{background:linear-gradient(135deg,#0ea5e9,#0284c7);box-shadow:0 4px 12px rgba(14,165,233,0.4)}
button.green{background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 4px 12px rgba(34,197,94,0.4)}
button.gold{background:linear-gradient(135deg,#f59e0b,#d97706);box-shadow:0 4px 12px rgba(245,158,11,0.4)}
#legend{display:flex;gap:14px;margin-top:7px;font-size:12px;color:#94a3b8;flex-wrap:wrap;justify-content:center}
/* win overlay */
#winOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#winOverlay.show{display:flex}
#winBox{background:linear-gradient(135deg,#1e3a5f,#0f2744);border:2px solid #ffd700;border-radius:24px;padding:32px 40px;text-align:center;max-width:320px}
#winBox h2{font-size:28px;color:#ffd700;margin-bottom:8px}
#winBox p{color:#a5f3fc;margin-bottom:20px;font-size:15px}
.win-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
</style>
</head>
<body>

<!-- タイトル画面 -->
<div id="titleScreen">
  <h1>🐧 ペンギン警察 X-CLASH 🐒</h1>
  <div class="subtitle">ペンギンでお猿を包囲しよう！</div>
  <div id="levelGrid"></div>
  <button class="title-music-btn" id="titleMusicBtn" onclick="toggleMusic()">🎵 音楽ON</button>
</div>

<!-- ゲーム画面 -->
<div id="gameScreen">
  <div id="topRow"><div id="levelInfo">レベル 1 / 20</div><div id="stars">★</div></div>
  <div id="message">ペンギンをタップして移動！</div>
  <canvas id="gameCanvas" width="500" height="530"></canvas>
  <div class="btn-row">
    <button onclick="resetLevel()">🔄 リスタート</button>
    <button class="blue" onclick="showTitle()">🏠 ホーム</button>
    <button class="green" id="musicBtn" onclick="toggleMusic()">🎵 音楽ON</button>
  </div>
  <div id="legend"><span>🐧 警察（操作）</span><span>🐒 逃走犯（AI）</span><span>🟠 EXIT</span></div>
</div>

<!-- クリア演出 -->
<div id="winOverlay">
  <div id="winBox">
    <h2>🎉 クリア！</h2>
    <p id="winMsg">レベル1 クリア！</p>
    <div class="win-btns">
      <button onclick="showTitle()" style="background:linear-gradient(135deg,#6366f1,#4f46e5)">🏠 ホーム</button>
      <button id="nextLvlBtn" class="gold" onclick="goNextLevel()">次のレベル ▶</button>
    </div>
  </div>
</div>

// ==================== オーディオ ====================
let audioCtx=null;
let musicOn=false;
let bgNodes=[];  // 再生中のオシレーター群
let bgGain=null;

function getAudioCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

// --- BGM: かわいいループメロディ ---
const melody=[
  [523,0.15],[659,0.15],[784,0.15],[1047,0.15],
  [880,0.15],[784,0.15],[659,0.15],[523,0.15],
  [587,0.15],[698,0.15],[880,0.15],[1175,0.15],
  [1047,0.15],[880,0.15],[698,0.15],[587,0.15],
];
const bassLine=[130,165,196,130,130,165,196,130,146,174,196,146,146,174,196,146];
let melodyStep=0, melodyTimer=null;

function startBGM(){
  if(!musicOn) return;
  const ac=getAudioCtx();
  bgGain=ac.createGain(); bgGain.gain.setValueAtTime(0.03,ac.currentTime); bgGain.connect(ac.destination);

  // パッドコード（和音ドローン）
  const padFreqs=[261,329,392,523];
  padFreqs.forEach(f=>{
    const o=ac.createOscillator(); o.type='sine'; o.frequency.value=f;
    const g=ac.createGain(); g.gain.value=0.015;
    o.connect(g); g.connect(bgGain); o.start(); bgNodes.push(o);
  });

  // リズム刻み
  playMelodyStep();
}

function playMelodyStep(){
  if(!musicOn) return;
  const ac=getAudioCtx();
  const [freq,dur]=melody[melodyStep%melody.length];
  const bassFreq=bassLine[melodyStep%bassLine.length];

  // メロディ音
  const o=ac.createOscillator(); o.type='square'; o.frequency.value=freq;
  const g=ac.createGain();
  g.gain.setValueAtTime(0,ac.currentTime);
  g.gain.linearRampToValueAtTime(0.025,ac.currentTime+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur*0.8);
  o.connect(g); g.connect(ac.destination);
  o.start(ac.currentTime); o.stop(ac.currentTime+dur);

  // ベース音
  const ob=ac.createOscillator(); ob.type='triangle'; ob.frequency.value=bassFreq;
  const gb=ac.createGain();
  gb.gain.setValueAtTime(0.03,ac.currentTime);
  gb.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur*0.5);
  ob.connect(gb); gb.connect(ac.destination);
  ob.start(ac.currentTime); ob.stop(ac.currentTime+dur);

  melodyStep++;
  melodyTimer=setTimeout(playMelodyStep, dur*1000);
}

function stopBGM(){
  clearTimeout(melodyTimer); melodyTimer=null;
  bgNodes.forEach(o=>{try{o.stop();}catch(e){}}); bgNodes=[];
  if(bgGain){bgGain.disconnect(); bgGain=null;}
}

function toggleMusic(){
  const syncBtns=(on)=>{
    ['musicBtn','titleMusicBtn'].forEach(id=>{
      const b=document.getElementById(id);
      if(!b)return;
      b.textContent=on?'🔇 音楽OFF':'🎵 音楽ON';
      b.style.background=on?'linear-gradient(135deg,#f59e0b,#d97706)':'';
    });
  };
  if(!musicOn){musicOn=true;syncBtns(true);startBGM();}
  else{musicOn=false;syncBtns(false);stopBGM();}
}

// --- 効果音 ---
function playMoveSound(){
  const ac=getAudioCtx();
  const o=ac.createOscillator(); o.type='sine'; o.frequency.value=800;
  const g=ac.createGain();
  g.gain.setValueAtTime(0.12,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.08);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime+0.08);
}

function playSelectSound(){
  const ac=getAudioCtx();
  const o=ac.createOscillator(); o.type='sine'; o.frequency.value=600;
  const g=ac.createGain();
  g.gain.setValueAtTime(0.1,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.06);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime+0.06);
}

function playCaptureSound(){
  // 🎉 捕獲成功ジングル！
  const ac=getAudioCtx();
  const notes=[523,659,784,1047,1319];
  notes.forEach((freq,i)=>{
    const t=ac.currentTime+i*0.1;
    const o=ac.createOscillator(); o.type='square'; o.frequency.value=freq;
    const g=ac.createGain();
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.15,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t+0.2);
  });
  // キラキラ上昇
  setTimeout(()=>{
    [1047,1319,1568,2093].forEach((f,i)=>{
      const t=ac.currentTime+i*0.07;
      const o=ac.createOscillator(); o.type='sine'; o.frequency.value=f;
      const g=ac.createGain();
      g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
      o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+0.2);
    });
  },550);
}

function playEscapeSound(){
  // 😱 逃走音（下降）
  const ac=getAudioCtx();
  const notes=[392,330,261,196];
  notes.forEach((freq,i)=>{
    const t=ac.currentTime+i*0.12;
    const o=ac.createOscillator(); o.type='sawtooth'; o.frequency.value=freq;
    const g=ac.createGain();
    g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t+0.22);
  });
}

function playMonkeyMoveSound(){
  const ac=getAudioCtx();
  const o=ac.createOscillator(); o.type='triangle';
  o.frequency.setValueAtTime(400,ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(250,ac.currentTime+0.12);
  const g=ac.createGain();
  g.gain.setValueAtTime(0.08,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.12);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime+0.13);
}

// ==================== ゲームロジック ====================
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
// ===== 進行管理 =====
let maxUnlocked = parseInt(localStorage.getItem('pxclash_max')||'0');
let cleared = JSON.parse(localStorage.getItem('pxclash_cleared')||'[]');
function saveProgress(){localStorage.setItem('pxclash_max',maxUnlocked);localStorage.setItem('pxclash_cleared',JSON.stringify(cleared));}

function showTitle(){
  document.getElementById('titleScreen').style.display='flex';
  document.getElementById('gameScreen').style.display='none';
  document.getElementById('winOverlay').classList.remove('show');
  buildGrid();
}
function showGame(idx){
  document.getElementById('titleScreen').style.display='none';
  document.getElementById('gameScreen').style.display='flex';
  init(idx);
}
function buildGrid(){
  const grid=document.getElementById('levelGrid');
  grid.innerHTML='';
  for(let i=0;i<20;i++){
    const btn=document.createElement('button');
    btn.className='lvl-btn '+(cleared.includes(i)?'cleared':i<=maxUnlocked?'unlocked':'locked');
    const star=cleared.includes(i)?'⭐':'';
    btn.innerHTML=`<span>${i+1}</span><span class="lvl-star">${star}</span>`;
    if(i<=maxUnlocked){btn.onclick=(()=>{const n=i;return()=>showGame(n);})();}
    grid.appendChild(btn);
  }
}
function goNextLevel(){
  document.getElementById('winOverlay').classList.remove('show');
  if(cur<19)showGame(cur+1);else showTitle();
}

let cur=0,state=null,sel=null,adj=[],phase='player';

function buildAdj(edges,n){const a=Array.from({length:n},()=>[]);for(const[u,v]of edges){a[u].push(v);a[v].push(u);}return a;}

function init(idx){
  const lv=levels[idx];
  adj=buildAdj(lv.edges,lv.nodes.length);
  state={penguins:[...lv.penguins],monkey:lv.monkey};
  sel=null;phase='player';
  document.getElementById('levelInfo').textContent='レベル '+(idx+1)+' / 20';
  document.getElementById('stars').textContent=starLabels[idx];
  document.getElementById('progressFill').style.width=Math.round((idx+1)/20*100)+'%';
  document.getElementById('message').textContent='ペンギンをクリックして移動させよう！';
  render();
}
function onClear(){
  if(!cleared.includes(cur))cleared.push(cur);
  if(cur+1>maxUnlocked&&cur<19)maxUnlocked=cur+1;
  saveProgress();
  document.getElementById('winMsg').textContent='レベル'+(cur+1)+' クリア！🎉';
  const nb=document.getElementById('nextLvlBtn');
  nb.style.display=cur<19?'':'none';
  setTimeout(()=>document.getElementById('winOverlay').classList.add('show'),400);
}
function resetLevel(){init(cur);}

function drawMonkey(x,y){
  if(georgeImg.complete && georgeImg.naturalWidth>0){
    ctx.drawImage(georgeImg, x-28, y-32, 58, 58);
  }
}

function nodeAt(mx,my){
  const ns=levels[cur].nodes;
  for(let i=0;i<ns.length;i++){const dx=mx-ns[i].x,dy=my-ns[i].y;if(dx*dx+dy*dy<28*28)return i;}
  return -1;
}
function occ(){return new Set([...state.penguins,state.monkey]);}

function handleInput(clientX,clientY){
  if(phase!=='player')return;
  const r=canvas.getBoundingClientRect();
  const mx=(clientX-r.left)*(canvas.width/r.width);
  const my=(clientY-r.top)*(canvas.height/r.height);
  const c=nodeAt(mx,my);
  if(c===-1){sel=null;render();return;}
  if(state.penguins.includes(c)){sel=c;playSelectSound();render();return;}
  if(sel!==null&&adj[sel].includes(c)&&!occ().has(c)){
    state.penguins[state.penguins.indexOf(sel)]=c;sel=null;
    playMoveSound();
    if(win()){phase='won';render();playCaptureSound();onClear();return;}
    phase='monkey';render();setTimeout(doMonkeyMove,550);
  }else{sel=null;render();}
}
canvas.addEventListener('click',e=>handleInput(e.clientX,e.clientY));
canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];handleInput(t.clientX,t.clientY);},{passive:false});

function win(){const p=new Set(state.penguins);return adj[state.monkey].every(n=>p.has(n));}

function doMonkeyMove(){
  if(phase!=='monkey')return;
  const lv=levels[cur];const ps=new Set(state.penguins);
  const av=adj[state.monkey].filter(n=>!ps.has(n));
  if(av.length===0){phase='won';render();playCaptureSound();onClear();return;}
  let best=av[0],bd=Infinity;
  for(const m of av){const d=bfs(m,lv.exitNode,ps);if(d<bd){bd=d;best=m;}}
  state.monkey=best;
  playMonkeyMoveSound();
  if(best===lv.exitNode){phase='lost';render();document.getElementById('message').textContent='😱 逃げられた！もう一度挑戦！';playEscapeSound();return;}
  if(win()){phase='won';render();playCaptureSound();onClear();return;}
  phase='player';render();
}

function bfs(s,g,bl){
  if(s===g)return 0;const v=new Set([s]);const q=[[s,0]];
  while(q.length){const[n,d]=q.shift();for(const nb of adj[n]){if(nb===g)return d+1;if(!v.has(nb)&&!bl.has(nb)){v.add(nb);q.push([nb,d+1]);}}}
  return 999;
}

function render(){
  const lv=levels[cur];const ns=lv.nodes;
  ctx.fillStyle='#dde3f5';ctx.beginPath();ctx.roundRect(0,0,canvas.width,canvas.height,16);ctx.fill();
  ctx.strokeStyle='#7986cb';ctx.lineWidth=5;ctx.lineCap='round';
  for(const[a,b]of lv.edges){ctx.beginPath();ctx.moveTo(ns[a].x,ns[a].y);ctx.lineTo(ns[b].x,ns[b].y);ctx.stroke();}
  if(sel!==null){
    const o=occ();ctx.strokeStyle='#00e676';ctx.lineWidth=5;
    for(const nb of adj[sel]){if(!o.has(nb)){ctx.beginPath();ctx.moveTo(ns[sel].x,ns[sel].y);ctx.lineTo(ns[nb].x,ns[nb].y);ctx.stroke();}}
  }
  for(let i=0;i<ns.length;i++){
    const n=ns[i];const isE=i===lv.exitNode;
    const isV=sel!==null&&adj[sel].includes(i)&&!occ().has(i);
    ctx.shadowColor='rgba(0,0,0,0.15)';ctx.shadowBlur=5;ctx.shadowOffsetY=2;
    ctx.beginPath();ctx.arc(n.x,n.y,26,0,Math.PI*2);
    ctx.fillStyle=isE?'#ff7043':isV?'#b9f6ca':'white';ctx.fill();
    ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;
    ctx.strokeStyle=sel===i?'#ffd700':isV?'#00c853':isE?'#bf360c':'#5c6bc0';
    ctx.lineWidth=sel===i?4:isV?3:2;ctx.stroke();
    if(isE){ctx.fillStyle='white';ctx.font='bold 10px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('EXIT',n.x,n.y);}
  }
  for(let i=0;i<ns.length;i++){
    const n=ns[i];const pi=state.penguins.indexOf(i);
    if(pi!==-1){
      if(sel===i){ctx.save();ctx.shadowColor='#ffd700';ctx.shadowBlur=20;ctx.beginPath();ctx.arc(n.x,n.y,28,0,Math.PI*2);ctx.fillStyle='rgba(255,215,0,0.2)';ctx.fill();ctx.restore();}
      const img=penguinImgs[pi%4];if(img.complete)ctx.drawImage(img,n.x-27,n.y-30,54,54);
    }else if(state.monkey===i){drawMonkey(n.x,n.y-4);}
  }
  if(phase==='monkey'){ctx.fillStyle='rgba(0,0,0,0.55)';ctx.beginPath();ctx.roundRect(0,0,canvas.width,42,0);ctx.fill();ctx.fillStyle='#ffd700';ctx.font='bold 16px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🐒 お猿が逃げています...',canvas.width/2,21);}
  if(phase==='won'){ctx.fillStyle='rgba(0,220,100,0.12)';ctx.beginPath();ctx.roundRect(0,0,canvas.width,canvas.height,16);ctx.fill();}
  if(phase==='lost'){ctx.fillStyle='rgba(220,0,50,0.12)';ctx.beginPath();ctx.roundRect(0,0,canvas.width,canvas.height,16);ctx.fill();}
}
showTitle();
</script>
